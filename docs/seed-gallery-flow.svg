<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- Arrowheads -->
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
  </style>

  <!-- Background -->
  <rect width="1000" height="660" fill="#0f172a"/>
  <rect width="1000" height="660" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="42" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">Seed-Gallery Request Flow</text>
  <text x="500" y="64" fill="#94a3b8" font-size="11" font-weight="400" text-anchor="middle">Cloudflare Workers + R2 Dual-Storage Architecture</text>

  <!-- ================================================================ -->
  <!-- CONNECTIONS (drawn first, behind boxes)                         -->
  <!-- ================================================================ -->

  <!-- Start → Diamond 1 -->
  <line x1="480" y1="143" x2="480" y2="173" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Diamond 1 YES → Edge CDN (right) -->
  <line x1="550" y1="220" x2="640" y2="220" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="575" y="213" fill="#34d399" font-size="10" font-weight="600">Yes</text>

  <!-- Edge CDN → Response 1 -->
  <line x1="750" y1="240" x2="750" y2="268" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Diamond 1 NO → custom-worker (down) -->
  <line x1="480" y1="260" x2="480" y2="292" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="492" y="280" fill="#fb7185" font-size="10" font-weight="600">No</text>

  <!-- custom-worker → Diamond 2 -->
  <line x1="480" y1="355" x2="480" y2="388" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Diamond 2 YES → Fetch R2 (right) -->
  <line x1="550" y1="420" x2="640" y2="420" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="575" y="413" fill="#22d3ee" font-size="10" font-weight="600">Yes</text>

  <!-- Fetch R2 → Response 2 -->
  <line x1="750" y1="440" x2="750" y2="468" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Diamond 2 NO → 404 (down) -->
  <line x1="480" y1="460" x2="480" y2="495" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-rose)"/>
  <text x="492" y="482" fill="#fb7185" font-size="10" font-weight="600">No</text>

  <!-- ================================================================ -->
  <!-- MASK LAYER (hides connection lines under boxes)                 -->
  <!-- ================================================================ -->

  <!-- Start box mask -->
  <rect x="310" y="83" width="340" height="60" rx="22" fill="#0f172a"/>

  <!-- Diamond 1 mask -->
  <polygon points="480,172 565,222 480,272 395,222" fill="#0f172a"/>

  <!-- Edge CDN mask -->
  <rect x="635" y="192" width="230" height="56" rx="8" fill="#0f172a"/>

  <!-- Response 1 mask -->
  <rect x="655" y="270" width="190" height="46" rx="18" fill="#0f172a"/>

  <!-- custom-worker mask -->
  <rect x="320" y="295" width="320" height="60" rx="8" fill="#0f172a"/>

  <!-- Diamond 2 mask -->
  <polygon points="480,372 565,422 480,472 395,422" fill="#0f172a"/>

  <!-- Fetch R2 mask -->
  <rect x="635" y="392" width="230" height="56" rx="8" fill="#0f172a"/>

  <!-- Response 2 mask -->
  <rect x="655" y="470" width="190" height="46" rx="18" fill="#0f172a"/>

  <!-- 404 mask -->
  <rect x="370" y="498" width="220" height="46" rx="18" fill="#0f172a"/>

  <!-- ================================================================ -->
  <!-- BOXES                                                           -->
  <!-- ================================================================ -->

  <!-- Start (Blueprint / Highlight) -->
  <rect x="310" y="83" width="340" height="60" rx="22" fill="rgba(59,130,246,0.12)" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="107" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">🌐 Browser Request</text>
  <text x="480" y="126" fill="#94a3b8" font-size="9" text-anchor="middle">/seed-gallery/images/xxx.jpg</text>

  <!-- Diamond 1 (Amber / Decision) -->
  <polygon points="480,172 565,222 480,272 395,222" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="218" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">CDN Static</text>
  <text x="480" y="232" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">Asset?</text>

  <!-- Edge CDN (Emerald / Secondary) -->
  <rect x="635" y="192" width="230" height="56" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="215" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">⚡ Serve from Edge CDN</text>
  <text x="750" y="233" fill="#94a3b8" font-size="8" text-anchor="middle">(no Worker invocation)</text>

  <!-- Response 1 (Emerald / End) -->
  <rect x="655" y="270" width="190" height="46" rx="18" fill="rgba(6,78,59,0.25)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="297" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">✅ 200 — Image Served</text>

  <!-- custom-worker (Violet / Tertiary) -->
  <rect x="320" y="295" width="320" height="60" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="319" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">🔀 custom-worker.js</text>
  <text x="480" y="339" fill="#94a3b8" font-size="9" text-anchor="middle">intercepts /seed-gallery/* → R2 proxy</text>

  <!-- Diamond 2 (Amber / Decision) -->
  <polygon points="480,372 565,422 480,472 395,422" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="418" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">R2 Object</text>
  <text x="480" y="432" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">exists?</text>

  <!-- Fetch from R2 (Cyan / Primary) -->
  <rect x="635" y="392" width="230" height="56" rx="8" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="415" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">📦 Fetch from R2</text>
  <text x="750" y="433" fill="#94a3b8" font-size="8" text-anchor="middle">happyimage-seed-gallery</text>

  <!-- Response 2 (Cyan / End) -->
  <rect x="655" y="470" width="190" height="46" rx="18" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="497" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">✅ 200 — Image Served</text>

  <!-- 404 (Rose / Error End) -->
  <rect x="370" y="498" width="220" height="46" rx="18" fill="rgba(136,19,55,0.25)" stroke="#fb7185" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="525" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">❌ 404 — Not Found</text>

  <!-- ================================================================ -->
  <!-- LEGEND                                                          -->
  <!-- ================================================================ -->

  <rect x="30" y="590" width="940" height="1" fill="#334155"/>

  <rect x="30" y="608" width="12" height="12" rx="3" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="48" y="618" fill="#94a3b8" font-size="9">Start</text>

  <polygon points="130,614 139,608 148,614 139,620" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="155" y="618" fill="#94a3b8" font-size="9">Decision</text>

  <rect x="230" y="608" width="12" height="12" rx="3" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="248" y="618" fill="#94a3b8" font-size="9">Worker</text>

  <rect x="320" y="608" width="12" height="12" rx="3" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="338" y="618" fill="#94a3b8" font-size="9">CDN Hit</text>

  <rect x="410" y="608" width="12" height="12" rx="3" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1"/>
  <text x="428" y="618" fill="#94a3b8" font-size="9">R2 Hit</text>

  <line x1="530" y1="614" x2="560" y2="614" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="567" y="618" fill="#94a3b8" font-size="9">Error path</text>

  <rect x="660" y="608" width="12" height="12" rx="6" fill="rgba(59,130,246,0.12)" stroke="#60a5fa" stroke-width="1"/>
  <text x="678" y="618" fill="#94a3b8" font-size="9">Response end</text>
</svg>