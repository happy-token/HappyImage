<svg width="1024" height="1024" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
    <clipPath id="squircle">
      <rect x="4" y="4" width="32" height="32" rx="7" ry="7" />
    </clipPath>
  </defs>

  <!-- Squircle background: 10% padding matches macOS icon spec -->
  <rect x="4" y="4" width="32" height="32" rx="7" ry="7" fill="url(#bg)" />

  <!-- Elements clipped to squircle -->
  <g clip-path="url(#squircle)">
    <!-- Lens outer ring -->
    <circle cx="20" cy="20" r="12" stroke="white" stroke-width="2.5" fill="none" />
    
    <!-- Eyes -->
    <circle cx="16" cy="17" r="2.2" fill="white" />
    <circle cx="24" cy="17" r="2.2" fill="white" />
    
    <!-- Smile -->
    <path d="M13.5,22 Q20,28 26.5,22" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Optical tick marks representing a camera aperture reticle -->
    <path d="M20,8 V11" stroke="white" stroke-width="2" stroke-linecap="round" />
    <path d="M20,29 V32" stroke="white" stroke-width="2" stroke-linecap="round" />
    <path d="M8,20 H11" stroke="white" stroke-width="2" stroke-linecap="round" />
    <path d="M29,20 H32" stroke="white" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
