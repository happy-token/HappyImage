appId: com.happyimage.desktop
productName: HappyImage
copyright: Copyright © 2026 HappyImage

directories:
  output: release
  buildResources: build

npmRebuild: false

files:
  - dist/**/*
  - package.json

extraResources:
  # App icon for dock / tray
  - from: build/icon.png
    to: icon.png
  - from: build/iconTemplate.png
    to: iconTemplate.png
  # Runtime npm dependencies for the sidecar server
  - from: deps/node_modules
    to: node_modules
  # Core as node_modules entry so Bun can resolve @happytokenai/happyimage-core
  - from: ../core/dist
    to: node_modules/@happytokenai/happyimage-core/dist
  - from: ../core/package.json
    to: node_modules/@happytokenai/happyimage-core/package.json
  # Web as node_modules entry so Bun can resolve @happytokenai/happyimage-web
  - from: ../web-ui/server
    to: node_modules/@happytokenai/happyimage-web/server
  - from: ../web-ui/dist
    to: node_modules/@happytokenai/happyimage-web/dist
  - from: ../web-ui/package.json
    to: node_modules/@happytokenai/happyimage-web/package.json
  # CLI scripts (called directly by sidecar)
  - from: ../cli/dist
    to: cli/dist
  - from: ../cli/package.json
    to: cli/package.json
  # Skills (required by the runtime)
  - from: ../../skills
    to: skills
  # Docs
  - from: ../../docs
    to: docs
    filter:
      - '**/*.md'

mac:
  target:
    - dmg
    - zip
  artifactName: HappyImage-${version}-mac.${ext}
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  icon: build/icon.icns
  category: public.app-category.graphics-design

dmg:
  window:
    width: 480
    height: 400
  iconSize: 100
  contents:
    - x: 140
      y: 180
    - x: 340
      y: 180
      type: link
      path: /Applications

publish:
  provider: generic
  url: https://releases.happyimage.app
