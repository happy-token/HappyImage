appId: com.happyimage.desktop
productName: HappyImage
copyright: Copyright © 2026 HappyImage

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../web-ui/dist
    to: web-ui
    filter:
      - '**/*'
      - '!screenshots/**'
  - from: ../web-ui/server
    to: web-server
  - from: ../core/dist
    to: core/dist
  - from: ../core/package.json
    to: core/package.json
  - from: ../cli/dist
    to: cli/dist
  - from: ../cli/package.json
    to: cli/package.json
  - from: ../../docs
    to: docs
    filter:
      - '**/*.md'

mac:
  target:
    - dmg
    - zip
  artifactName: HappyImage-${version}-mac.${ext}
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  icon: build/icon.icns
  category: public.app-category.graphics-design

dmg:
  window:
    width: 480
    height: 400
  iconSize: 100
  contents:
    - x: 140
      y: 180
    - x: 340
      y: 180
      type: link
      path: /Applications

publish:
  provider: generic
  url: https://releases.happyimage.app
