name: Deploy Web to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-cloudflare-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    environment:
      name: production
      url: https://happyimage-web.happytoken.workers.dev

    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Deploy
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$BACKEND_URL" || {
            echo "GitHub variable BACKEND_URL is required for production deploys" >&2
            exit 1
          }
          node -e '
            const fs = require("fs");
            const path = "wrangler.jsonc";
            const backendUrl = process.env.BACKEND_URL;
            const text = fs.readFileSync(path, "utf8");
            const replaceVar = (source, name, value) => {
              const pattern = new RegExp(`"${name}":\\s*"[^"]*"`);
              if (!pattern.test(source)) {
                throw new Error(`${name} entry not found in wrangler.jsonc`);
              }
              return source.replace(pattern, `"${name}": ${JSON.stringify(value)}`);
            }
            const next = replaceVar(
              replaceVar(text, "BACKEND_URL", backendUrl),
              "MODEL_BACKEND_URL",
              backendUrl,
            );
            fs.writeFileSync(path, next);
          '
          pnpm run deploy
