name: Publish npm Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (semver)'
        required: true
        type: string
      npm-tag:
        description: 'npm dist-tag'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Bump versions
        run: bash scripts/version-bump.sh "${{ github.event.inputs.version }}"

      - name: Build and publish @happytokenai/happyimage-core
        working-directory: packages/core
        run: |
          bun run build
          npm publish --access public --tag ${{ github.event.inputs.npm-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @happytokenai/happyimage-web
        working-directory: packages/web-ui
        run: |
          bun run build
          npm publish --access public --tag ${{ github.event.inputs.npm-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @happyimage/cli
        working-directory: packages/cli
        run: |
          # Replace workspace protocol with semver for npm publish
          sed -i "s/\"workspace:\\^[0-9.]*\"/\"^${{ github.event.inputs.version }}\"/g" package.json
          bun run build
          npm publish --access public --tag ${{ github.event.inputs.npm-tag }}
          # Restore workspace protocol for repo
          sed -i "s/\"^${{ github.event.inputs.version }}\"/\"workspace:^${{ github.event.inputs.version }}\"/g" package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump packages to v${{ github.event.inputs.version }}" || echo "No changes to commit"
          git tag -f "npm-v${{ github.event.inputs.version }}"
          git push origin main --tags || echo "Push skipped"
