# Deploy HappyImage Web to Cloudflare Workers via OpenNext

name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    environment:
      name: production
      url: https://happyimage-web.happytoken.workers.dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Deploy
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$BACKEND_URL" || {
            echo "GitHub variable BACKEND_URL is required for production deploys" >&2
            exit 1
          }
          node -e '
            const fs = require("fs");
            const path = "wrangler.jsonc";
            const backendUrl = process.env.BACKEND_URL;
            const text = fs.readFileSync(path, "utf8");
            const next = text.replace(
              /"BACKEND_URL":\s*"[^"]*"/,
              `"BACKEND_URL": ${JSON.stringify(backendUrl)}`,
            );
            if (next === text) {
              throw new Error("BACKEND_URL entry not found in wrangler.jsonc");
            }
            fs.writeFileSync(path, next);
          '
          pnpm run deploy
