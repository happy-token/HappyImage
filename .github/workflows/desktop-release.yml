name: Build and Release Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Desktop App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Update version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          bash scripts/version-bump.sh "$VERSION"
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build core
        run: bun run build:core

      - name: Build web-ui
        run: bun run build:web

      - name: Build CLI
        run: bun run build:cli

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERT_PATH=$(mktemp /tmp/cert_XXXXXX.p12)
          echo "$CSC_LINK" | base64 -d > "$CERT_PATH"

          KEYCHAIN_PATH=/tmp/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security list-keychains -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build and sign desktop app
        working-directory: packages/desktop
        run: bun run build
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}

      - name: Notarize app
        run: |
          APP_PATH=$(find packages/desktop/release -name "HappyImage.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: HappyImage.app not found"
            exit 1
          fi
          echo "Notarizing: $APP_PATH"

          xcrun notarytool submit "$APP_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait --timeout 600

          xcrun stapler staple "$APP_PATH" || echo "Stapling warning (non-critical)"

          # Also notarize DMG if built
          DMG=$(find packages/desktop/release -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            echo "Notarizing DMG: $DMG"
            xcrun notarytool submit "$DMG" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait --timeout 600
            xcrun stapler staple "$DMG" || echo "Stapling DMG warning (non-critical)"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          TAG="desktop-v${VERSION}"

          echo "=== Release artifacts ==="
          find packages/desktop/release -type f | sort

          ASSETS=$(find packages/desktop/release -type f \( -name "*.dmg" -o -name "*.zip" -o -name "latest-mac.yml" \) | tr '\n' ' ')

          gh release create "$TAG" $ASSETS \
            --repo "${{ github.repository }}" \
            --title "HappyImage Desktop v${VERSION}" \
            --notes "Desktop app release v${VERSION}" \
            --generate-notes

          echo "Release: https://github.com/${{ github.repository }}/releases/tag/${TAG}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump to desktop v${{ env.RELEASE_VERSION }}" || echo "No changes"
          git tag "v${{ env.RELEASE_VERSION }}"
          git push origin main --tags

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain /tmp/build.keychain 2>/dev/null || true
